# Port chạy ứng dụng local
server.port=8080

# ==========================================
# CẤU HÌNH KẾT NỐI SQL SERVER
# ==========================================
# Máy SQL Server của bạn: HOANGYENACER\SQLEXPRESS
# Lưu ý trong file .properties phải viết dấu \ thành \\
spring.datasource.url=jdbc:sqlserver://HOANGYENACER\\SQLEXPRESS;databaseName=ClothesShopDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==========================================
# CẤU HÌNH HIBERNATE / JPA
# ==========================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# CẤU HÌNH THYMELEAF
# ==========================================
spring.thymeleaf.cache=false

# ==========================================
# CẤU HÌNH UPLOAD ẢNH SẢN PHẨM
# ==========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
