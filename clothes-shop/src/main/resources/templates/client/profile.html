<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang Cá Nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-5" style="max-width: 600px;">
    <div class="card border-0 shadow-sm p-5 text-center bg-white">
        <div class="mb-4">
            <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Toan" class="rounded-circle bg-danger p-2" width="100">
        </div>
        <h3 class="fw-bold mb-1" th:text="${user.fullName}">Tên Thành Viên</h3>
        <p class="text-muted" th:text="'@' + ${user.username}"></p>
        <hr class="my-4">
        <div class="text-start">
            <p class="mb-2"><strong>Email đăng ký:</strong> <span class="text-muted ms-2" th:text="${user.email}"></span></p>
            <p class="mb-2"><strong>Vai trò tài khoản:</strong> <span class="badge bg-success ms-2" th:text="${user.role}"></span></p>
        </div>
        <a href="/" class="btn btn-outline-dark mt-4 rounded-pill">Quay lại Trang Chủ</a>
    </div>
</div>
</body>
</html>
