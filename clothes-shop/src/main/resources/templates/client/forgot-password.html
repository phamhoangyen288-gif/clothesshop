<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - ClothesShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link class="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: header}"></div>

<div class="container my-5 d-flex justify-content-center align-items-center" style="min-height: 65vh;">
    <div class="card border-0 shadow-sm p-4 bg-white rounded-3" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <div class="text-danger mb-2">
                <i class="fa-solid fa-key fs-1"></i>
            </div>
            <h3 class="fw-bold text-dark">Quên Mật Khẩu?</h3>
            <p class="text-muted small">Nhập email tài khoản của bạn, chúng tôi sẽ gửi liên kết đặt lại mật khẩu mới.</p>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center py-2 rounded-3 border-0 small" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success text-center py-2 rounded-3 border-0 small" th:text="${success}"></div>

        <form th:action="@{/forgot-password}" method="POST">
            <div class="mb-4">
                <label for="email" class="form-label fw-semibold text-dark small">Email đã đăng ký</label>
                <input type="email" class="form-control px-3 py-2" id="email" name="email" placeholder="Nhập chính xác email của bạn" required>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 rounded-pill fw-bold text-uppercase mb-3" style="background-color: #dc3545;">
                Gửi Yêu Cầu Khôi Phục
            </button>

            <div class="text-center">
                <a th:href="@{/login}" class="text-decoration-none small text-secondary fw-semibold">
                    <i class="fa-solid fa-arrow-left me-1"></i> Quay lại Đăng nhập
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
