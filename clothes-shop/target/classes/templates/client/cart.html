<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ Hàng Của Bạn</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light">
<div class="container my-5">
    <h2 class="fw-bold mb-4"><i class="fa-solid fa-bag-shopping text-danger"></i> Giỏ Hàng Chi Tiết</h2>
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="card border-0 shadow-sm p-4">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Sản phẩm</th>
                        <th>Giá</th>
                        <th>Số lượng</th>
                        <th>Tổng</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="item : ${cartItems}">
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <img th:src="${item.imageUrl}" width="60" class="rounded">
                                <div>
                                    <h6 class="fw-bold mb-0" th:text="${item.productName}"></h6>
                                    <small class="text-muted" th:text="'Phân loại: ' + ${item.size} + ' / ' + ${item.color}"></small>
                                </div>
                            </div>
                        </td>
                        <td th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                        <td th:text="${item.quantity}"></td>
                        <td class="fw-bold text-danger" th:text="${#numbers.formatDecimal(item.price * item.getQuantity(), 0, 'COMMA', 0, 'POINT') + 'đ'}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm p-4 bg-white">
                <h5 class="fw-bold mb-3">Thông Tin Nhận Hàng</h5>
                <form action="/order/checkout" method="POST">
                    <div class="mb-3">
                        <input type="text" name="fullName" class="form-control" placeholder="Họ và tên người nhận" required>
                    </div>
                    <div class="mb-3">
                        <input type="text" name="phone" class="form-control" placeholder="Số điện thoại" required>
                    </div>
                    <div class="mb-3">
                        <textarea name="address" class="form-control" placeholder="Địa chỉ giao hàng chi tiết" rows="3" required></textarea>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="fw-semibold">Tổng tiền thanh toán:</span>
                        <span class="fs-4 fw-bold text-danger" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}">0đ</span>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 rounded-pill py-2 fw-bold">XÁC NHẬN ĐẶT HÀNG</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
