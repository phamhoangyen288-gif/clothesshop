<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ClothesShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: header}"></div>

<div class="container my-5 d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="card border-0 shadow-sm p-4 bg-white rounded-3" style="width: 100%; max-width: 450px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Đăng Nhập Hệ Thống</h3>
            <p class="text-muted small">Chào mừng bạn quay trở lại với ClothesShop</p>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center py-2 rounded-3 border-0 small" th:text="${error}"></div>

        <form th:action="@{/login}" method="POST">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold text-dark small">Tài khoản (Username)</label>
                <input type="text" class="form-control px-3 py-2" id="username" name="username"
                       placeholder="Nhập tài khoản của bạn" required>
            </div>

            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="password" class="form-label fw-semibold text-dark small mb-0">Mật khẩu</label>
                    <a th:href="@{/forgot-password}" class="text-decoration-none small text-danger">Quên mật khẩu?</a>
                </div>
                <input type="password" class="form-control px-3 py-2" id="password" name="password"
                       placeholder="••••••••" minlength="6" required>
                <div class="form-text text-muted" style="font-size: 0.75rem;">Mật khẩu phải chứa ít nhất 6 ký tự.</div>
            </div>

            <div class="mb-4 form-check">
                <input type="checkbox" class="form-check-input" id="rememberMe">
                <label class="form-check-label small text-muted" for="rememberMe">Ghi nhớ đăng nhập</label>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 rounded-pill fw-bold text-uppercase mb-3" style="background-color: #dc3545;">
                Đăng Nhập
            </button>

            <div class="text-center">
                <span class="small text-muted">Bạn chưa có tài khoản? </span>
                <a th:href="@{/register}" class="text-decoration-none small text-danger fw-bold">Đăng ký ngay</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
