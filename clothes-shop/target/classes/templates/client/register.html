<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - ClothesShop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="bg-light">

<div th:replace="~{fragments/navbar :: header}"></div>

<div class="container my-5 d-flex justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="card border-0 shadow-sm p-4 bg-white rounded-3" style="width: 100%; max-width: 500px;">
        <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Tạo Tài Khoản Mới</h3>
            <p class="text-muted small">Đăng ký thành viên để nhận nhiều ưu đãi từ ClothesShop</p>
        </div>

        <div th:if="${error}" class="alert alert-danger text-center py-2 rounded-3 border-0 small" th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success text-center py-2 rounded-3 border-0 small" th:text="${success}"></div>

        <form th:action="@{/register}" method="POST">
            <div class="mb-3">
                <label for="fullName" class="form-label fw-semibold text-dark small">Họ và tên</label>
                <input type="text" class="form-control px-3 py-2" id="fullName" name="fullName" placeholder="Nhập họ và tên của bạn" required>
            </div>

            <div class="mb-3">
                <label for="email" class="form-label fw-semibold text-dark small">Địa chỉ Email</label>
                <input type="email" class="form-control px-3 py-2" id="email" name="email" placeholder="vi_du@gmail.com" required>
            </div>

            <div class="mb-3">
                <label for="username" class="form-label fw-semibold text-dark small">Tài khoản (Username)</label>
                <input type="text" class="form-control px-3 py-2" id="username" name="username" placeholder="Tên đăng nhập viết liền không dấu" required>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold text-dark small">Mật khẩu</label>
                <input type="password" class="form-control px-3 py-2" id="password" name="password" placeholder="Tối thiểu 6 ký tự" minlength="6" required>
                <div class="form-text text-muted" style="font-size: 0.72rem;">Mật khẩu bắt buộc phải từ 6 ký tự trở lên để bảo mật.</div>
            </div>

            <button type="submit" class="btn btn-danger w-100 py-2 rounded-pill fw-bold text-uppercase mb-3" style="background-color: #dc3545;">
                Đăng Ký Thành Viên
            </button>

            <div class="text-center">
                <span class="small text-muted">Bạn đã có tài khoản rồi? </span>
                <a th:href="@{/login}" class="text-decoration-none small text-danger fw-bold">Đăng nhập ngay</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
